name: Metrics
on:
  # Schedule daily updates
  schedule: [{cron: "0 0 * * *"}]
  # (optional) Run workflow manually
  workflow_dispatch:
  # (optional) Run workflow when pushing on master/main
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Use default GitHub token (no setup required)
          token: ${{ secrets.GITHUB_TOKEN }}

          # Options
          user: wegonbeok45
          template: classic
          base: header, repositories, metadata
          config_timezone: UTC
          
          # Aesthetics - Matches your dark exact color
          config_theme: dark
          config_display: large
          
          # Plugins
          
          # Isocalendar (Contributions calendar)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # Coding habits (Facts only, charts disabled to prevent error)
          plugin_habits: yes
          plugin_habits_charts: no
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          
          # Languages
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_details: bytes-size, percentage
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          
          # (Removed Music and Projects to clear errors)
